<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — 週次レポート</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: #f5f4f0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .card {
    background: #fff; border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 14px; padding: 2.5rem 2rem; width: 100%; max-width: 380px;
  }
  .icon-wrap {
    width: 48px; height: 48px; border-radius: 12px; background: #E6F1FB;
    display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem;
  }
  .icon-wrap svg { width: 24px; height: 24px; stroke: #185FA5; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6b6b6b; margin-bottom: 1.75rem; }
  label { display: block; font-size: 13px; color: #6b6b6b; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px; font-size: 15px; color: #1a1a1a; outline: none; transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
  .error-msg {
    font-size: 13px; color: #A32D2D; background: #FCEBEB;
    border-radius: 10px; padding: 8px 12px; margin-top: 10px; display: none;
  }
  .error-msg.show { display: block; }
  button[type="submit"] {
    width: 100%; margin-top: 1rem; padding: 11px; background: #185FA5;
    color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
  }
  button[type="submit"]:hover { background: #0C447C; }
  button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
  .footer { font-size: 12px; color: #999; text-align: center; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>週次レポート</h1>
  <p class="subtitle">続けるにはパスワードを入力してください</p>
  <form id="loginForm">
    <label for="password">パスワード</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" autofocus />
    <div class="error-msg" id="errorMsg">パスワードが正しくありません</div>
    <button type="submit" id="submitBtn">ログイン</button>
  </form>
  <p class="footer">このアプリは認証済みユーザーのみ使用できます</p>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    btn.disabled = true; btn.textContent = '確認中...';
    try {
      const res = await fetch('/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (data.success) { window.location.href = '/'; }
      else {
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'ログイン';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch {
      err.textContent = '接続エラーが発生しました';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'ログイン';
    }
  });
</script>
</body>
</html>
